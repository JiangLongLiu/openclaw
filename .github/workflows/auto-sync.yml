name: Auto Sync from Upstream

on:
  schedule:
    # 每天 UTC 时间 18:00 运行（北京时间凌晨 2:00）
    - cron: '0 18 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

env:
  # 上游仓库地址 (openclaw)
  UPSTREAM_REPO: https://github.com/openclaw/openclaw.git
  # 上游分支
  UPSTREAM_BRANCH: main
  # 目标分支
  TARGET_BRANCH: main

jobs:
  sync-from-upstream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }} || git remote set-url upstream ${{ env.UPSTREAM_REPO }}
      
      - name: Fetch upstream
        run: |
          git fetch upstream --tags --force
      
      - name: Get latest upstream commit
        id: upstream
        run: |
          echo "commit=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})" >> $GITHUB_OUTPUT
      
      - name: Check if sync needed
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=${{ steps.upstream.outputs.commit }}
          
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date"
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          else
            echo "Sync needed: $LOCAL -> $UPSTREAM"
            echo "sync_needed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Sync code (preserving .github directory)
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # 保存你的 .github 目录到临时位置
          cp -r .github /tmp/github-config-backup
          
          # 获取所有上游文件列表（排除 .github）
          git ls-tree -r --name-only upstream/${{ env.UPSTREAM_BRANCH }} | \
            grep -v '^\.github/' | \
            xargs git checkout upstream/${{ env.UPSTREAM_BRANCH }} --
          
          # 删除所有不在上游的文件（除了 .github）
          git clean -fdx --exclude='.github/'
          
          # 恢复你的 .github 配置
          rm -rf .github
          cp -r /tmp/github-config-backup .github
          
          # 确保 auto-sync.yml 存在
          if [ ! -f ".github/workflows/auto-sync.yml" ]; then
            echo "Warning: auto-sync.yml is missing!"
          fi
      
      - name: Commit changes
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          git add -A
          git commit -m "chore: sync from upstream ${{ steps.upstream.outputs.commit }}" || echo "No changes to commit"
      
      - name: Push to fork
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          git push origin ${{ env.TARGET_BRANCH }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup
        run: |
          git remote remove upstream || true
          rm -rf /tmp/github-config-backup || true
      
      - name: Notify success
        if: success()
        run: |
          echo "✅ 同步成功！上游仓库：${{ env.UPSTREAM_REPO }}"
          echo "📅 同步时间：$(date)"
          echo "🔗 上游 commit: ${{ steps.upstream.outputs.commit }}"
      
      - name: Already up to date
        if: steps.check.outputs.sync_needed == 'false'
        run: |
          echo "ℹ️  已经是最新版本，无需同步"
