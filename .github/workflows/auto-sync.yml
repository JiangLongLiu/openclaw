name: Auto Sync from Upstream

on:
  schedule:
    # 每天 UTC 时间 18:00 运行（北京时间凌晨 2:00）
    - cron: '0 18 * * *'
  
  # 允许手动触发测试
  workflow_dispatch:

env:
  # 上游仓库地址 (openclaw)
  UPSTREAM_REPO: https://github.com/openclaw/openclaw.git
  # 上游分支
  UPSTREAM_BRANCH: main
  # 目标分支
  TARGET_BRANCH: main

jobs:
  sync-from-upstream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }} || git remote set-url upstream ${{ env.UPSTREAM_REPO }}
      
      - name: Fetch upstream
        run: |
          git fetch upstream --tags --force
      
      - name: Sync code (excluding .github directory)
        run: |
          # 获取上游分支的最新提交
          git fetch origin +refs/heads/${{ env.TARGET_BRANCH }}:refs/remotes/origin/${{ env.TARGET_BRANCH }}
          
          # 创建一个临时分支来保存你的 .github 配置
          git checkout -b temp-save-github
          git add -A
          git commit -m "save github configs" || true
          
          # 重置到上游
          git reset --hard upstream/${{ env.UPSTREAM_BRANCH }}
          
          # 删除 .github 目录（用你保存的替换）
          rm -rf .github
          
          # 恢复你的 .github 配置
          git checkout temp-save-github -- .github/ || true
          
          # 清理临时分支
          git branch -D temp-save-github || true
          
          # 确保删除 labeler.yml（如果存在）
          rm -f .github/labeler.yml
          rm -f .github/workflows/labeler.yml
      
      - name: Push to fork
        run: |
          git push origin ${{ env.TARGET_BRANCH }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup
        run: |
          git remote remove upstream || true
      
      - name: Notify success
        if: success()
        run: |
          echo "✅ 同步成功！上游仓库：${{ env.UPSTREAM_REPO }}"
          echo "📅 同步时间：$(date)"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ 同步失败！请检查上游仓库是否存在"
          exit 1
