name: Auto Sync from Upstream

on:
  schedule:
    # 每周一 UTC 时间 2:00 运行（北京时间 10:00）
    - cron: '0 2 * * 1'
  
  # 允许手动触发
  workflow_dispatch:

env:
  # 上游仓库地址
  UPSTREAM_REPO: https://github.com/JingMatrix/openclaw.git
  # 上游分支
  UPSTREAM_BRANCH: main
  # 目标分支
  TARGET_BRANCH: main

jobs:
  sync-from-upstream:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN || secrets.PAT_TOKEN }}
          fetch-depth: 0
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }} || git remote set-url upstream ${{ env.UPSTREAM_REPO }}
      
      - name: Fetch upstream
        run: |
          git fetch upstream --tags --force
      
      - name: Reset to upstream latest
        run: |
          git reset --hard upstream/${{ env.UPSTREAM_BRANCH }}/
      
      - name: Push to fork
        run: |
          git push origin ${{ env.TARGET_BRANCH }} --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Cleanup
        run: |
          git remote remove upstream || true
